  <div class="article" id="article-container">
    <div style="text-align:center;padding:60px;color:#64748B;font-family:'DM Mono';font-size:11px;">LOADING...</div>
  </div>

  <footer>
    <span>Verdad Score Intelligence · verdadscore.com</span>
    <span>matthew@verdadscore.com</span>
  </footer>

  <script>
    const API = "https://coldfact.up.railway.app";
    const params = new URLSearchParams(window.location.search);
    let slug = params.get("slug");
    let currentLang = params.get("lang") || "en";

    function setLang(lang) {
      currentLang = lang;
      document.getElementById("btn-en").classList.toggle("active", lang === "en");
      document.getElementById("btn-es").classList.toggle("active", lang === "es");
      loadPost();
    }

    function renderMarkdown(text) {
      return text
        .replace(/^# (.+)$/gm, "<h1>$1</h1>")
        .replace(/^## (.+)$/gm, "<h2>$1</h2>")
        .replace(/^### (.+)$/gm, "<h3>$1</h3>")
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\n\n/g, "</p><p>")
        .replace(/^(?!<[h|p])/gm, "<p>")
        + "</p>";
    }

    async function loadPost() {
      try {
        const resp = await fetch(`${API}/blog/posts/${slug}?language=${currentLang}`);
        const post = await resp.json();

        document.title = `${post.title} — Verdad Score`;

        // SEO meta tags
        const setMeta = (name, val, prop=false) => {
          let el = document.querySelector(prop ? `meta[property="${name}"]` : `meta[name="${name}"]`);
          if (!el) { el = document.createElement("meta"); el.setAttribute(prop ? "property" : "name", name); document.head.appendChild(el); }
          el.setAttribute("content", val);
        };
        const excerpt = post.excerpt?.replace(/^#+\s*/gm,"").replace(/\*\*/g,"").slice(0,160) || "";
        setMeta("description", excerpt);
        setMeta("keywords", `${post.subject}, media credibility, credibilidad mediatica, VCI, Verdad Score, Argentine media, periodismo argentino`);
        setMeta("og:title", post.title, true);
        setMeta("og:description", excerpt, true);
        setMeta("og:type", "article", true);
        setMeta("og:url", window.location.href, true);
        setMeta("og:site_name", "Verdad Score", true);
        setMeta("twitter:card", "summary_large_image");
        setMeta("twitter:title", post.title);
        setMeta("twitter:description", excerpt);

        // Canonical URL
        let canonical = document.querySelector("link[rel='canonical']");
        if (!canonical) { canonical = document.createElement("link"); canonical.rel = "canonical"; document.head.appendChild(canonical); }
        canonical.href = `https://verdadscore.com/blog-post.html?slug=${slug}`;

        document.getElementById("article-container").innerHTML = `
          <a href="/blog.html" class="back">← Back to Blog</a>
          <div class="subject-label">${post.subject?.toUpperCase() || "MEDIA ANALYSIS"}</div>
          <h1 class="article-title">${post.title}</h1>
          <div class="article-meta">
            ${post.published_at ? new Date(post.published_at).toLocaleDateString("en-GB", {day:"2-digit",month:"long",year:"numeric"}) : "Draft"} · verdadscore.com
          </div>
          <div class="lang-toggle">
            <button class="lang-btn ${currentLang==="en"?"active":""}" id="btn-en" onclick="setLang('en')">EN</button>
            <button class="lang-btn ${currentLang==="es"?"active":""}" id="btn-es" onclick="setLang('es')">ES</button>
          </div>
          <div class="article-body">${renderMarkdown(post.content || "")}</div>
          <div class="cta">
            <div class="cta-title">See the full report</div>
            <div class="cta-sub">Generate credibility reports for any public figure, journalist or outlet.</div>
            <a href="https://app.verdadscore.com" class="cta-btn">TRY VERDAD SCORE FREE →</a>
          </div>
        `;
      } catch(e) {
        document.getElementById("article-container").innerHTML = '<div style="padding:60px;text-align:center;color:#64748B">Post not found.</div>';
      }
    }

    loadPost();
  </script>

    <!-- SEO tag population — Session 19 -->
    <script>
    // Called after post data is fetched. Pass in the post object and current lang.
    function updateSEOTags(post, lang) {
        const slug   = new URLSearchParams(window.location.search).get('slug') || '';
        const url    = 'https://verdadscore.com/blog-post.html?slug=' + slug;
        // API returns single-language fields (title, excerpt) already resolved by ?language= param
        const title  = post.title   || '';
        const desc   = (post.excerpt || '').replace(/^#+\s*/gm, '').replace(/\*\*/g, '').slice(0, 160);
        const imgUrl = post.cover_image_url || 'https://verdadscore.com/og-default.png';
        const pubDate = post.published_at ? post.published_at.split('T')[0] : '';
        const updDate = post.updated_at   ? post.updated_at.split('T')[0]   : pubDate;

        // Canonical
        const canon = document.getElementById('canonical-tag');
        if (canon) canon.href = url;

        // hreflang
        document.querySelectorAll('link[hreflang]').forEach(el => {
            el.href = url;
        });

        // og: tags (update existing or create)
        function setMeta(prop, val, attr='property') {
            let el = document.querySelector('meta[' + attr + '="' + prop + '"]');
            if (!el) { el = document.createElement('meta'); el.setAttribute(attr, prop); document.head.appendChild(el); }
            el.setAttribute('content', val);
        }
        setMeta('og:title',        title);
        setMeta('og:description',  desc);
        setMeta('og:url',          url);
        setMeta('og:image',        imgUrl);
        setMeta('og:type',         'article');
        setMeta('og:locale',       lang === 'es' ? 'es_AR' : 'en_US');
        setMeta('twitter:title',   title,   'name');
        setMeta('twitter:description', desc, 'name');
        setMeta('twitter:image',   imgUrl,  'name');
        setMeta('twitter:card',    'summary_large_image', 'name');

        // <title>
        document.title = title + ' — Verdad Score';

        // JSON-LD Article
        const ld = document.getElementById('jsonld-article');
        if (ld) {
            const obj = JSON.parse(ld.textContent);
            obj.headline     = title;
            obj.description  = desc;
            obj.image        = imgUrl;
            obj.datePublished = pubDate;
            obj.dateModified  = updDate;
            obj.inLanguage   = lang === 'es' ? 'es-AR' : 'en-US';
            obj.url          = url;
            ld.textContent   = JSON.stringify(obj, null, 2);
        }

        // JSON-LD Breadcrumb — update post title in position 3
        const bc = document.getElementById('jsonld-breadcrumb');
        if (bc) {
            const obj = JSON.parse(bc.textContent);
            obj.itemListElement[2].name = title;
            obj.itemListElement[2].item = url;
            bc.textContent = JSON.stringify(obj, null, 2);
        }
    }

    // Expose globally so existing fetch logic can call it
    window.updateSEOTags = updateSEOTags;
    </script>
    <!-- END SEO JS -->
